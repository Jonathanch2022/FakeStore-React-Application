name: CI & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --watchAll=false

  deploy:
    needs: test               # <- only runs if "test" job succeeds
    if: ${{ success() }}      # <- extra guard (redundant but explicit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install deps
        run: npm ci

      # Example: Vercel deployment via CLI (replace with your method)
      - name: Pull Vercel env
        run: npx vercel pull --yes --environment=production --token=${{ x0Xqe54jLOmzH7t0fuMSROuZ }}

      - name: Build
        run: npx vercel build --prod --token=${{ x0Xqe54jLOmzH7t0fuMSROuZ }}

      - name: Deploy
        run: npx vercel deploy --prebuilt --prod --token=${{ x0Xqe54jLOmzH7t0fuMSROuZ }}
