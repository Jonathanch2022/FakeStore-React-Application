name: CI • Promote to main • Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write  # needed to push to main

concurrency:
  group: promote-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --ci --watchAll=false

  promote_and_deploy:
    needs: test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Promote current commit to main
        run: |
          # Set 'main' to the tested commit (fast or force-with-lease if needed)
          git fetch origin main || true
          git push --force-with-lease origin "$GITHUB_SHA":refs/heads/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci

      - name: Vercel pull (prod)
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build (prebake)
        run: npx vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy (prebuilt → prod)
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"